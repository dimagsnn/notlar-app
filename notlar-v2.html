<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notlarım v2</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ===================================================================
       TEMA — Uygulamanın renklerini buradan değiştir.
       Tek bir satırı değiştirince ilgili her yer otomatik değişir.
       =================================================================== */
    :root {
      --accent:        #3ecf8e;   /* ana renk (butonlar, aktif sekme) */
      --accent-hover:  #34b87c;   /* butonun üstüne gelince */
      --accent-text:   #06281b;   /* ana renkli butonların yazı rengi */
      --page-bg:       #f4f5f7;   /* sayfa arka planı */
      --card-bg:       #ffffff;   /* kart arka planı */
      --text:          #1a1a1a;   /* genel yazı rengi */
    }
    /* PEMBE tema istersen: yukarıdaki --accent satırlarını şununla değiştir:
       --accent: #ec4899;  --accent-hover: #db2777;  --accent-text: #ffffff;
    */

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--page-bg); color: var(--text); min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 32px 16px;
    }
    .wrap { width: 100%; max-width: 600px; position: relative; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .sub { color: #6b7280; font-size: 14px; margin-bottom: 20px; }
    h2 { font-size: 15px; margin-bottom: 10px; color: #111827; }
    .card { background: var(--card-bg); border: 1px solid #e5e7eb; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    input, textarea, select {
      width: 100%; border: 1px solid #d1d5db; border-radius: 8px;
      padding: 10px 12px; font-size: 14px; font-family: inherit; margin-bottom: 12px; background: #fff;
    }
    textarea { resize: vertical; min-height: 60px; }
    button {
      background: var(--accent); color: var(--accent-text); border: none; border-radius: 8px;
      padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button.ghost { background: #f3f4f6; color: #374151; }
    button.ghost:hover { background: #e5e7eb; }
    button.danger { background: transparent; color: #ef4444; padding: 4px 8px; font-size: 13px; }
    button.small { padding: 6px 10px; font-size: 13px; }
    .row { display: flex; gap: 8px; align-items: center; }
    .row > * { flex: 1; }
    .row button { flex: none; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button { flex: 1; background: #f3f4f6; color: #6b7280; }
    .tabs button.active { background: var(--accent); color: var(--accent-text); }
    .note { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 10px; background: #fff; }
    .note.done .note-title { text-decoration: line-through; color: #9ca3af; }
    .note-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .note-content { font-size: 14px; color: #4b5563; white-space: pre-wrap; margin-bottom: 6px; }
    .note-img { max-width: 100%; border-radius: 8px; margin: 6px 0; }
    .chip { display: inline-block; font-size: 12px; background: #eef2ff; color: #4338ca; padding: 2px 8px; border-radius: 999px; }
    .note-foot { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 8px; }
    .note-date { font-size: 12px; color: #9ca3af; }
    .note-actions { display: flex; gap: 4px; align-items: center; }
    .check { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #374151; cursor: pointer; }
    .check input { width: auto; margin: 0; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .who { font-size: 13px; color: #6b7280; line-height: 1.4; }
    .who b { color: #111827; }
    .msg { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; }
    .msg.err { background: #fef2f2; color: #b91c1c; }
    .msg.ok { background: #f0fdf4; color: #166534; }
    .empty { text-align: center; color: #9ca3af; font-size: 14px; padding: 20px 0; }
    .hidden { display: none; }
    .cat-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .cat-item { display: flex; align-items: center; gap: 4px; background: #f3f4f6; border-radius: 999px; padding: 4px 6px 4px 12px; font-size: 13px; }
    .cat-item button { background: transparent; color: #ef4444; padding: 0 4px; font-size: 14px; }
    .hint { font-size: 12px; color: #9ca3af; margin-top: -6px; margin-bottom: 10px; }
    .preset-btn { background: #eef2ff; color: #4338ca; border: 1px solid #c7d2fe; border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: 500; }
    .preset-btn:hover { background: #e0e7ff; }
    .preset-btn.added { opacity: .45; cursor: default; }
    .preset-btn.added:hover { background: #eef2ff; }
    .app-grid { display: flex; gap: 16px; align-items: flex-start; }
    .app-grid .main-col { flex: 1; min-width: 0; }
    .app-grid .side-col { width: 250px; flex: none; }
    @media (max-width: 720px) {
      .app-grid { flex-direction: column; }
      .app-grid .side-col { width: 100%; }
    }
    /* Profil butonu açılır menüsü */
    .menu-wrap { position: relative; }
    .menu {
      position: absolute; right: 0; top: calc(100% + 6px); z-index: 20;
      background: #fff; border: 1px solid #e5e7eb; border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,.12); padding: 6px; min-width: 160px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .menu button {
      background: transparent; color: #374151; text-align: left;
      padding: 9px 12px; border-radius: 7px; font-weight: 500; width: 100%;
    }
    .menu button:hover { background: #f3f4f6; }
    #menu-logout { color: #ef4444; }
    /* Modal (profil düzenle penceresi) */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(17,24,39,.5);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 16px; z-index: 50; overflow-y: auto;
    }
    .modal {
      background: #fff; border-radius: 14px; padding: 22px;
      width: 100%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .modal-close { background: transparent; color: #6b7280; font-size: 22px; line-height: 1; padding: 0 6px; }
    .modal-close:hover { background: transparent; color: #111827; }
    /* .hidden'ın bu iki bileşende de geçerli olması için (öncelik düzeltmesi) */
    .menu.hidden, .modal-overlay.hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Notlarım</h1>
    <p class="sub">Profil · kategori · todo · dosya — Supabase ile</p>

    <div id="auth-msg"></div>

    <!-- ===== GİRİŞ / KAYIT EKRANI ===== -->
    <div id="auth-view" class="card">
      <div class="tabs">
        <button id="tab-login" class="active">Giriş yap</button>
        <button id="tab-signup">Kayıt ol</button>
      </div>

      <label>E-posta</label>
      <input id="email" type="email" placeholder="ornek@mail.com" />
      <label>Şifre</label>
      <input id="password" type="password" placeholder="••••••" />

      <!-- Sadece kayıt modunda görünen ek alanlar -->
      <div id="signup-extra" class="hidden">
        <label>Doğum tarihi</label>
        <input id="birth-date" type="date" />

        <label>Cinsiyet</label>
        <select id="gender">
          <option value="">Seçiniz</option>
          <option value="Kadın">Kadın</option>
          <option value="Erkek">Erkek</option>
          <option value="Belirtmek istemiyorum">Belirtmek istemiyorum</option>
        </select>

        <label>İl</label>
        <select id="province"><option value="">Yükleniyor...</option></select>

        <label>İlçe</label>
        <select id="district"><option value="">Önce il seçin</option></select>

        <label>Mahalle</label>
        <select id="neighborhood"><option value="">Önce ilçe seçin</option></select>
        <p class="hint">İl/ilçe/mahalle verileri turkiyeapi.dev üzerinden çekilir.</p>
      </div>

      <button id="submit-btn">Giriş yap</button>
    </div>

    <!-- ===== UYGULAMA EKRANI ===== -->
    <div id="app-view" class="hidden">
      <div class="topbar">
        <span class="who" id="who"></span>
        <div class="menu-wrap">
          <button class="ghost small" id="profile-btn">Profil ▾</button>
          <div class="menu hidden" id="profile-menu">
            <button id="menu-edit">Profil Düzenle</button>
            <button id="menu-logout">Çıkış yap</button>
          </div>
        </div>
      </div>

      <!-- Kategoriler -->
      <div class="card">
        <h2>Kategoriler</h2>
        <p class="hint" style="margin-top:0">Hazır kategoriler — tıklayarak ekle:</p>
        <div class="cat-list" id="preset-list"></div>
        <div class="row" style="margin-top:12px">
          <input id="cat-name" type="text" placeholder="Veya kendi kategorini yaz" style="margin-bottom:0" />
          <button id="cat-add" class="small">Ekle</button>
        </div>
        <p class="hint" style="margin:10px 0 0">Eklenen kategoriler:</p>
        <div class="cat-list" id="cat-list"></div>
      </div>

      <!-- Yeni not -->
      <div class="card">
        <h2>Yeni not</h2>
        <label>Başlık</label>
        <input id="note-title" type="text" placeholder="Not başlığı" />
        <label>İçerik</label>
        <textarea id="note-content" placeholder="Not içeriği..."></textarea>
        <label>Kategori</label>
        <select id="note-category"><option value="">Kategorisiz</option></select>
        <label>Resim (opsiyonel)</label>
        <input id="note-image" type="file" accept="image/*" />
        <button id="add-btn">Not ekle</button>
      </div>

      <div id="app-msg"></div>

      <!-- Filtre -->
      <div class="card" style="padding:12px 20px">
        <div class="row" style="align-items:center">
          <label style="margin:0">Kategoriye göre filtrele</label>
          <select id="filter-category" style="margin:0">
            <option value="all">Tümü</option>
          </select>
        </div>
      </div>

      <div id="notes-list"></div>

      <!-- ===== PROFİL DÜZENLE PENCERESİ (MODAL) ===== -->
      <div class="modal-overlay hidden" id="profile-modal">
        <div class="modal">
          <div class="modal-head">
            <h2 style="margin:0">Profili Düzenle</h2>
            <button class="modal-close" id="profile-close">×</button>
          </div>
          <p class="hint" id="profile-summary" style="margin-top:0">—</p>
          <label>Doğum tarihi</label>
          <input id="p-birth" type="date" />
          <label>Cinsiyet</label>
          <select id="p-gender">
            <option value="">Seçiniz</option>
            <option value="Kadın">Kadın</option>
            <option value="Erkek">Erkek</option>
            <option value="Belirtmek istemiyorum">Belirtmek istemiyorum</option>
          </select>
          <label>İl <span class="hint" style="display:inline">(kayıtlı bilgin seçili gelir)</span></label>
          <select id="p-province"><option value="">Yükleniyor...</option></select>
          <label>İlçe</label>
          <select id="p-district"><option value="">Önce il seçin</option></select>
          <label>Mahalle</label>
          <select id="p-neighborhood"><option value="">Önce ilçe seçin</option></select>
          <button id="p-save">Güncelle</button>
          <div id="p-msg" style="margin-top:10px"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== ORTAM AYARLARI (dev / canlı) =====
    // Her ortamın kendi Supabase projesi var. Aşağıda hepsi tanımlı.
    const ENVIRONMENTS = {
      prod: {
        url: "https://earpoizjdokqfxvjrddb.supabase.co",
        key: "sb_publishable_Jmeday3M98gN5obj6rB-fQ_r2M8zxSb"
      },
      dev: {
        url: "https://kgrhgiubzposlesavmim.supabase.co",
        key: "sb_publishable_5F01S8b6i2UJ73QfLRDdjA_XVhOZ5Wo"
      }
    };

    // Hangi ortamdayız? Açıldığımız adrese bakıp karar veriyoruz.
    function detectEnv() {
      const host = location.hostname; // sitenin açıldığı adres
      // Canlı adres(ler)i: aşağıdaki listede geçen bir adresteysek "prod"
      const PROD_HOSTS = ["dimagsnn.github.io", "fanciful-conkies-ff30da.netlify.app"];
      if (PROD_HOSTS.includes(host)) return "prod";
      // "dev" geçen bir adresteysek dev (Cloudflare dev linki gibi)
      if (host.includes("dev")) return "dev";
      // Geri kalan her durumda (örn. bilgisayarda dosyadan açma) güvenli taraf: dev
      return "dev";
    }

    const ENV = detectEnv();
    const CONFIG = ENVIRONMENTS[ENV];

    // ===== Supabase bağlantısı =====
    const SUPABASE_URL = CONFIG.url;
    const SUPABASE_KEY = CONFIG.key;
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const GEO = "https://api.turkiyeapi.dev/v1"; // il/ilçe/mahalle API

    // Hangi ortamda olduğumuzu ekranda küçük bir rozetle göster
    window.addEventListener("DOMContentLoaded", () => {
      const badge = document.createElement("div");
      badge.textContent = (ENV === "prod" ? "CANLI" : "DEV") + " ortamı";
      badge.style.cssText =
        "position:fixed;bottom:10px;right:10px;z-index:999;font-size:11px;" +
        "padding:4px 10px;border-radius:999px;font-weight:600;color:#fff;" +
        "background:" + (ENV === "prod" ? "#16a34a" : "#f59e0b") + ";opacity:.85;";
      document.body.appendChild(badge);
    });

    const $ = (id) => document.getElementById(id);
    const state = { user: null, profile: null, categories: [], notes: [], editingId: null, filter: "all", mode: "login" };
    // Tıklayarak hızlıca eklenebilen hazır kategoriler
    const PRESET_CATEGORIES = ["Analiz", "Tasarım", "Geliştirme", "Süreç", "Test", "Canlı", "Hata/Düzeltme", "Dokümantasyon"];

    function showMsg(target, text, type) {
      target.innerHTML = text ? `<div class="msg ${type}">${text}</div>` : "";
    }
    function esc(str) { const d = document.createElement("div"); d.textContent = str ?? ""; return d.innerHTML; }

    // ===== Sekme: Giriş / Kayıt =====
    $("tab-login").onclick = () => setMode("login");
    $("tab-signup").onclick = () => setMode("signup");
    function setMode(mode) {
      state.mode = mode;
      $("tab-login").classList.toggle("active", mode === "login");
      $("tab-signup").classList.toggle("active", mode === "signup");
      $("signup-extra").classList.toggle("hidden", mode !== "signup");
      $("submit-btn").textContent = mode === "login" ? "Giriş yap" : "Kayıt ol";
      if (mode === "signup" && $("province").options.length <= 1) loadProvinces();
    }

    // ===== İl / İlçe / Mahalle =====
    // API varsayılan 10 kayıt verir ve limit'in üst sınırı vardır.
    // Bu yüzden 100'erli sayfalarla, hepsi gelene kadar tekrar tekrar isteriz.
    async function fetchAll(path, extraParams) {
      const pageSize = 100;
      let offset = 0, all = [];
      while (true) {
        const extra = extraParams ? `&${extraParams}` : "";
        const url = `${GEO}/${path}?fields=id,name&sort=name&limit=${pageSize}&offset=${offset}${extra}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error("Konum servisi yanıt vermedi (" + r.status + ")");
        const j = await r.json();
        const data = j.data || [];
        all = all.concat(data);
        if (data.length < pageSize) break;   // son sayfaya geldik
        offset += pageSize;
        if (offset > 6000) break;            // güvenlik freni
      }
      return all;
    }
    function fill(select, items, placeholder) {
      select.innerHTML = `<option value="">${placeholder}</option>` +
        items.map(i => `<option value="${i.id}" data-name="${esc(i.name)}">${esc(i.name)}</option>`).join("");
    }
    async function loadProvincesInto(provId) {
      try {
        const data = await fetchAll("provinces");
        fill($(provId), data, "İl seçin");
      } catch (e) { $(provId).innerHTML = `<option value="">Yüklenemedi</option>`; }
    }
    async function loadDistrictsInto(distId, provinceId) {
      try { fill($(distId), await fetchAll("districts", `provinceId=${provinceId}`), "İlçe seçin"); }
      catch (e) { $(distId).innerHTML = `<option value="">Yüklenemedi</option>`; }
    }
    async function loadNeighborhoodsInto(neighId, districtId) {
      try { fill($(neighId), await fetchAll("neighborhoods", `districtId=${districtId}`), "Mahalle seçin"); }
      catch (e) { $(neighId).innerHTML = `<option value="">Yüklenemedi</option>`; }
    }
    // Bir grup il/ilçe/mahalle açılır kutusunu birbirine bağlar
    function wireCascade(provId, distId, neighId) {
      $(provId).onchange = async () => {
        const id = $(provId).value;
        $(distId).innerHTML = `<option value="">${id ? "Yükleniyor..." : "Önce il seçin"}</option>`;
        $(neighId).innerHTML = `<option value="">Önce ilçe seçin</option>`;
        if (id) await loadDistrictsInto(distId, id);
      };
      $(distId).onchange = async () => {
        const id = $(distId).value;
        $(neighId).innerHTML = `<option value="">${id ? "Yükleniyor..." : "Önce ilçe seçin"}</option>`;
        if (id) await loadNeighborhoodsInto(neighId, id);
      };
    }
    // Kayıt formu için bağla
    wireCascade("province", "district", "neighborhood");
    // Profil penceresi için bağla
    wireCascade("p-province", "p-district", "p-neighborhood");

    function loadProvinces() { return loadProvincesInto("province"); }

    function selectedName(id) {
      const sel = $(id); const opt = sel.options[sel.selectedIndex];
      return opt ? (opt.getAttribute("data-name") || "") : "";
    }
    // Açılır kutuda, isme göre (data-name) seçim yapar; bulduğu option'ın value'sunu döndürür
    function selectByName(selId, name) {
      if (!name) return "";
      const sel = $(selId);
      for (const opt of sel.options) {
        if (opt.getAttribute("data-name") === name) { sel.value = opt.value; return opt.value; }
      }
      return "";
    }

    // ===== Giriş / Kayıt gönder =====
    $("submit-btn").onclick = async () => {
      const email = $("email").value.trim();
      const password = $("password").value;
      if (!email || !password) return showMsg($("auth-msg"), "E-posta ve şifre gerekli.", "err");

      if (state.mode === "login") {
        showMsg($("auth-msg"), "Giriş yapılıyor...", "ok");
        const { error } = await db.auth.signInWithPassword({ email, password });
        if (error) return showMsg($("auth-msg"), "Hata: " + error.message, "err");
        showMsg($("auth-msg"), "", ""); refresh();
      } else {
        showMsg($("auth-msg"), "Kayıt yapılıyor...", "ok");
        const { data, error } = await db.auth.signUp({ email, password });
        if (error) return showMsg($("auth-msg"), "Hata: " + error.message, "err");
        if (!data.session) {
          return showMsg($("auth-msg"), "Kayıt alındı ama oturum açılmadı. E-posta doğrulaması açık olabilir; Authentication ayarlarından kapatıp tekrar deneyin.", "err");
        }
        // Profil bilgisini kaydet
        const { error: pErr } = await db.from("profiles").insert({
          id: data.user.id,
          birth_date: $("birth-date").value || null,
          gender: $("gender").value || null,
          province: selectedName("province") || null,
          district: selectedName("district") || null,
          neighborhood: selectedName("neighborhood") || null
        });
        if (pErr) showMsg($("auth-msg"), "Kullanıcı oluştu ama profil kaydı başarısız: " + pErr.message, "err");
        else showMsg($("auth-msg"), "", "");
        refresh();
      }
    };

    // ===== Profil butonu menüsü + modal =====
    function toggleMenu(show) {
      const menu = $("profile-menu");
      const open = show ?? menu.classList.contains("hidden");
      menu.classList.toggle("hidden", !open);
    }
    $("profile-btn").onclick = (e) => { e.stopPropagation(); toggleMenu(); };
    // Menü dışına tıklanınca kapan
    document.addEventListener("click", () => toggleMenu(false));
    $("profile-menu").onclick = (e) => e.stopPropagation();

    async function openProfileModal() {
      showMsg($("p-msg"), "", "");
      $("profile-modal").classList.remove("hidden");
      await fillProfileForm();
    }
    function closeProfileModal() { $("profile-modal").classList.add("hidden"); }

    $("menu-edit").onclick = () => { toggleMenu(false); openProfileModal(); };
    $("menu-logout").onclick = async () => { toggleMenu(false); await db.auth.signOut(); refresh(); };
    $("profile-close").onclick = closeProfileModal;
    // Karartılmış alana (pencerenin dışına) tıklayınca kapan
    $("profile-modal").onclick = (e) => { if (e.target === $("profile-modal")) closeProfileModal(); };

    // ===== Oturum durumu =====
    async function refresh() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        state.user = session.user;
        $("auth-view").classList.add("hidden");
        $("app-view").classList.remove("hidden");
        await loadProfile();
        await loadCategories();
        await loadNotes();
      } else {
        state.user = null;
        $("auth-view").classList.remove("hidden");
        $("app-view").classList.add("hidden");
      }
    }

    let profileProvincesLoaded = false;
    async function loadProfile() {
      const { data } = await db.from("profiles").select("*").eq("id", state.user.id).maybeSingle();
      state.profile = data || {};

      // Üst bardaki kısa gösterim
      $("who").innerHTML = `<b>${esc(state.user.email)}</b>`;

      // Pencere içindeki özet satırı
      const parts = [data?.neighborhood, data?.district, data?.province].filter(Boolean);
      const summary = [];
      if (data?.birth_date) summary.push("Doğum: " + data.birth_date);
      if (data?.gender) summary.push(data.gender);
      if (parts.length) summary.push(parts.join(" / "));
      $("profile-summary").textContent = summary.length ? summary.join(" · ") : "Henüz bilgi girilmemiş.";
    }

    // Profil penceresindeki tüm alanları kayıtlı bilgilerle doldurur (konum dahil)
    async function fillProfileForm() {
      const p = state.profile || {};
      $("p-birth").value = p.birth_date || "";
      $("p-gender").value = p.gender || "";

      // İl listesini bir kez yükle
      if (!profileProvincesLoaded) {
        await loadProvincesInto("p-province");
        profileProvincesLoaded = true;
      }
      // İlçe/mahalleyi sıfırla, sonra kayıtlı konumu seçili getir
      $("p-province").value = "";
      $("p-district").innerHTML = `<option value="">Önce il seçin</option>`;
      $("p-neighborhood").innerHTML = `<option value="">Önce ilçe seçin</option>`;

      if (p.province) {
        const provId = selectByName("p-province", p.province);
        if (provId) {
          await loadDistrictsInto("p-district", provId);
          if (p.district) {
            const distId = selectByName("p-district", p.district);
            if (distId) {
              await loadNeighborhoodsInto("p-neighborhood", distId);
              if (p.neighborhood) selectByName("p-neighborhood", p.neighborhood);
            }
          }
        }
      }
    }

    // Profil güncelle
    $("p-save").onclick = async () => {
      const update = {
        id: state.user.id,
        birth_date: $("p-birth").value || null,
        gender: $("p-gender").value || null
      };
      // Konum sadece yeni bir il seçildiyse güncellenir; aksi halde mevcut kalır
      if ($("p-province").value) {
        update.province = selectedName("p-province") || null;
        update.district = selectedName("p-district") || null;
        update.neighborhood = selectedName("p-neighborhood") || null;
      } else {
        update.province = state.profile?.province || null;
        update.district = state.profile?.district || null;
        update.neighborhood = state.profile?.neighborhood || null;
      }
      showMsg($("p-msg"), "Kaydediliyor...", "ok");
      // upsert: profil yoksa oluşturur, varsa günceller
      const { error } = await db.from("profiles").upsert(update);
      if (error) return showMsg($("p-msg"), "Hata: " + error.message, "err");
      showMsg($("p-msg"), "Profil güncellendi.", "ok");
      await loadProfile();
      await fillProfileForm();
    };

    // ===== Kategoriler =====
    $("cat-add").onclick = async () => {
      const name = $("cat-name").value.trim();
      if (!name) return;
      const { error } = await db.from("categories").insert({ name });
      if (error) return showMsg($("app-msg"), "Kategori eklenemedi: " + error.message, "err");
      $("cat-name").value = "";
      await loadCategories();
    };
    async function loadCategories() {
      const { data, error } = await db.from("categories").select("*").order("name");
      if (error) { showMsg($("app-msg"), "Kategoriler yüklenemedi: " + error.message, "err"); return; }
      state.categories = data || [];
      renderCategories();
    }
    function renderCategories() {
      $("cat-list").innerHTML = state.categories.length
        ? state.categories.map(c => `<span class="cat-item">${esc(c.name)}<button onclick="deleteCategory(${c.id})">×</button></span>`).join("")
        : `<span class="empty" style="padding:6px 0">Henüz kategori yok.</span>`;
      renderPresets();
      const opts = `<option value="">Kategorisiz</option>` +
        state.categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
      $("note-category").innerHTML = opts;
      $("filter-category").innerHTML = `<option value="all">Tümü</option>` +
        state.categories.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join("");
      $("filter-category").value = state.filter;
    }
    function renderPresets() {
      const added = new Set(state.categories.map(c => c.name.toLocaleLowerCase("tr")));
      $("preset-list").innerHTML = PRESET_CATEGORIES.map(name => {
        const isAdded = added.has(name.toLocaleLowerCase("tr"));
        return `<button class="preset-btn ${isAdded ? "added" : ""}" ${isAdded ? "disabled" : ""}
          onclick="addPreset('${name}')">${esc(name)}${isAdded ? " ✓" : ""}</button>`;
      }).join("");
    }
    window.addPreset = async (name) => {
      const exists = state.categories.some(c => c.name.toLocaleLowerCase("tr") === name.toLocaleLowerCase("tr"));
      if (exists) return;
      const { error } = await db.from("categories").insert({ name });
      if (error) return showMsg($("app-msg"), "Kategori eklenemedi: " + error.message, "err");
      await loadCategories();
    };
    window.deleteCategory = async (id) => {
      const { error } = await db.from("categories").delete().eq("id", id);
      if (error) return showMsg($("app-msg"), "Silinemedi: " + error.message, "err");
      if (state.filter == id) state.filter = "all";
      await loadCategories(); await loadNotes();
    };

    // ===== Notlar =====
    $("filter-category").onchange = () => { state.filter = $("filter-category").value; renderNotes(); };

    $("add-btn").onclick = async () => {
      const title = $("note-title").value.trim();
      const content = $("note-content").value.trim();
      const categoryId = $("note-category").value || null;
      if (!title) return showMsg($("app-msg"), "Başlık boş olamaz.", "err");

      let imageUrl = null;
      const file = $("note-image").files[0];
      if (file) {
        showMsg($("app-msg"), "Resim yükleniyor...", "ok");
        const path = `${state.user.id}/${Date.now()}_${file.name}`;
        const { error: upErr } = await db.storage.from("note-images").upload(path, file);
        if (upErr) return showMsg($("app-msg"), "Resim yüklenemedi: " + upErr.message, "err");
        imageUrl = db.storage.from("note-images").getPublicUrl(path).data.publicUrl;
      }

      const { error } = await db.from("notes").insert({
        title, content, category_id: categoryId, image_url: imageUrl
      });
      if (error) return showMsg($("app-msg"), "Eklenemedi: " + error.message, "err");

      $("note-title").value = ""; $("note-content").value = "";
      $("note-category").value = ""; $("note-image").value = "";
      showMsg($("app-msg"), "", "");
      await loadNotes();
    };

    async function loadNotes() {
      const { data, error } = await db
        .from("notes")
        .select("*, categories(name)")
        .order("created_at", { ascending: false });
      if (error) { showMsg($("app-msg"), "Notlar yüklenemedi: " + error.message, "err"); return; }
      state.notes = data || [];
      renderNotes();
    }

    function renderNotes() {
      const list = $("notes-list");
      let notes = state.notes;
      if (state.filter !== "all") notes = notes.filter(n => String(n.category_id) === String(state.filter));

      if (!notes.length) { list.innerHTML = `<div class="empty">Burada gösterilecek not yok.</div>`; return; }

      list.innerHTML = notes.map(n => {
        if (n.id === state.editingId) {
          const opts = `<option value="">Kategorisiz</option>` +
            state.categories.map(c => `<option value="${c.id}" ${c.id === n.category_id ? "selected" : ""}>${esc(c.name)}</option>`).join("");
          return `<div class="note">
            <input id="edit-title-${n.id}" value="${esc(n.title)}" />
            <textarea id="edit-content-${n.id}">${esc(n.content || "")}</textarea>
            <select id="edit-cat-${n.id}">${opts}</select>
            <div class="row" style="margin-top:6px">
              <button class="small" onclick="saveEdit(${n.id})">Kaydet</button>
              <button class="ghost small" onclick="cancelEdit()">İptal</button>
            </div>
          </div>`;
        }
        const cat = n.categories ? `<span class="chip">${esc(n.categories.name)}</span>` : "";
        const img = n.image_url ? `<img class="note-img" src="${esc(n.image_url)}" alt="" />` : "";
        return `<div class="note ${n.is_done ? "done" : ""}">
          <div class="note-title">${esc(n.title)} ${cat}</div>
          <div class="note-content">${esc(n.content || "")}</div>
          ${img}
          <div class="note-foot">
            <label class="check">
              <input type="checkbox" ${n.is_done ? "checked" : ""} onchange="toggleDone(${n.id}, this.checked)" />
              Tamamlandı
            </label>
            <div class="note-actions">
              <span class="note-date">${new Date(n.created_at).toLocaleDateString("tr-TR")}</span>
              <button class="ghost small" onclick="startEdit(${n.id})">Düzenle</button>
              <button class="danger" onclick="deleteNote(${n.id})">Sil</button>
            </div>
          </div>
        </div>`;
      }).join("");
    }

    window.toggleDone = async (id, value) => {
      const { error } = await db.from("notes").update({ is_done: value }).eq("id", id);
      if (error) return showMsg($("app-msg"), "Güncellenemedi: " + error.message, "err");
      await loadNotes();
    };
    window.startEdit = (id) => { state.editingId = id; renderNotes(); };
    window.cancelEdit = () => { state.editingId = null; renderNotes(); };
    window.saveEdit = async (id) => {
      const title = $(`edit-title-${id}`).value.trim();
      const content = $(`edit-content-${id}`).value.trim();
      const categoryId = $(`edit-cat-${id}`).value || null;
      if (!title) return showMsg($("app-msg"), "Başlık boş olamaz.", "err");
      const { error } = await db.from("notes").update({ title, content, category_id: categoryId }).eq("id", id);
      if (error) return showMsg($("app-msg"), "Güncellenemedi: " + error.message, "err");
      state.editingId = null;
      await loadNotes();
    };
    window.deleteNote = async (id) => {
      const { error } = await db.from("notes").delete().eq("id", id);
      if (error) return showMsg($("app-msg"), "Silinemedi: " + error.message, "err");
      await loadNotes();
    };

    // Başlat
    refresh();
  </script>
</body>
</html>
